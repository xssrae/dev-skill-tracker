server:
  port: 8082

spring:
  application:
    name: consumer-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: dev-skill-dashboard
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.devskilltracker.events
        spring.json.value.default.type: com.devskilltracker.events.SkillCompletedEvent
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/devskill}
    username: ${POSTGRES_USER:devskill}
    password: ${POSTGRES_PASSWORD:devskill}
  flyway:
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/devskill}
    user: ${POSTGRES_USER:devskill}
    password: ${POSTGRES_PASSWORD:devskill}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
