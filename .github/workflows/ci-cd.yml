name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_PRODUCER: dev-skill-tracker-producer
  ECR_REPOSITORY_CONSUMER: dev-skill-tracker-consumer

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

  docker-ecr-ecs:
    needs: build-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Package services
        run: mvn -B -DskipTests package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push producer
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY_PRODUCER:$IMAGE_TAG producer-service
          docker push $REGISTRY/$ECR_REPOSITORY_PRODUCER:$IMAGE_TAG

      - name: Build and push consumer
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY_CONSUMER:$IMAGE_TAG consumer-service
          docker push $REGISTRY/$ECR_REPOSITORY_CONSUMER:$IMAGE_TAG

      - name: Deploy ECS services
        run: |
          aws ecs update-service --cluster dev-skill-tracker --service producer-service --force-new-deployment
          aws ecs update-service --cluster dev-skill-tracker --service consumer-service --force-new-deployment
